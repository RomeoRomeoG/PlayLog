<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Playlog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:       #0c0c0e;
  --surface:  #131316;
  --surface2: #1c1c20;
  --border:   #242428;
  --border2:  #2e2e34;
  --text:     #ececec;
  --text2:    #7a7a8a;
  --text3:    #4a4a58;
  --white:    #ffffff;
  --accent:   #ffffff;

  --greg-c: #f472b6;
  --anth-c: #a78bfa;
  --sam-c:  #60a5fa;
  --joel-c: #34d399;

  --pc: var(--greg-c);
  --pg: var(--greg-c);

  --radius: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#root { max-width: 720px; margin: 0 auto; padding: 0 20px 100px; }

/* ── HEADER ── */
.site-header {
  padding: 40px 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); margin-bottom: 28px;
}
.logo {
  font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--white);
}
.logo span { color: #f472b6; }
.logo-eyebrow { display: none; }
.header-badge { text-align: right; }
.header-badge-name { font-size: 13px; font-weight: 600; color: var(--pc); display: block; }
.header-badge-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.header-inner { display: contents; }
.logo-block { display: contents; }

/* ── PLAYER RAIL ── */
.player-rail {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px;
  overflow-x: auto; scrollbar-width: none;
}
.player-rail::-webkit-scrollbar { display: none; }
.prail-btn {
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  transition: all 0.12s; white-space: nowrap;
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.prail-btn:hover { color: var(--text); background: var(--surface2); }
.prail-btn.active { background: var(--surface2); color: var(--white); font-weight: 600; border: 1px solid var(--border2); }
.prail-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--text3); }
.prail-btn.active .prail-dot { background: var(--pc); }

/* ── STAT CARDS ── */
.stat-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 12px; text-align: center;
}
.stat-num { font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: -0.02em; line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

/* ── NAV TABS ── */
.nav-tabs {
  display: flex; gap: 2px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 3px; margin-bottom: 20px;
  overflow-x: auto; scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  padding: 6px 12px; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text3); cursor: pointer; transition: all 0.12s;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active { background: #f472b6; color: #fff; font-weight: 600; border: none; }

/* ── TABS ACTIONS ── */
.tabs-actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.tabs-actions .nav-tabs { flex: 1; margin-bottom: 0; }

/* ── BUTTONS ── */
.btn {
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  padding: 7px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text); cursor: pointer; transition: all 0.12s;
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
}
.btn:hover { border-color: var(--text3); color: var(--white); }
.btn-primary {
  background: #f472b6; border-color: #f472b6; color: #fff; font-weight: 600;
}
.btn-primary:hover { background: #ec4899; border-color: #ec4899; color: #fff; }
.btn-danger { color: #f87171; border-color: transparent; background: transparent; }
.btn-danger:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text3); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); border-color: transparent; }

/* ── GAME CARD ── */
.game-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  margin-bottom: 6px; display: flex; min-height: 88px;
  transition: border-color 0.12s;
}
.game-card:hover { border-color: var(--border2); }
.game-accent { width: 3px; min-width: 3px; background: var(--pc); flex-shrink: 0; }
.game-cover { width: 60px; min-width: 60px; background: var(--surface2); flex-shrink: 0; overflow: hidden; }
.game-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.game-cover-ph {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--text3);
}
.cover-spin { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin 0.7s linear infinite; }
.game-body { padding: 12px 14px; flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
.game-title { font-size: 13px; font-weight: 600; color: var(--white); line-height: 1.3; margin-bottom: 6px; }
.game-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.pill {
  font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px;
  background: var(--surface2); color: var(--text3); border: 1px solid var(--border);
}
.pill-playing { background: rgba(244,114,182,0.12); color: #f472b6; border-color: rgba(244,114,182,0.25); }
.pill-beaten  { background: rgba(52,211,153,0.1);  color: #34d399; border-color: rgba(52,211,153,0.2); }
.pill-backlog { background: var(--surface2); color: var(--text3); }
.pill-dropped { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.2); }
.game-meta { font-size: 10px; color: var(--text3); display: flex; gap: 8px; flex-wrap: wrap; }
.game-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.game-actions { display: flex; gap: 4px; }

/* ── STARS ── */
.stars { display: inline-flex; gap: 2px; }
.star { font-size: 12px; cursor: pointer; transition: transform 0.1s; color: var(--border2); }
.star:hover { transform: scale(1.3); color: #f59e0b; }
.star.lit { color: #f59e0b; }
.star-sm { font-size: 11px; }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; z-index: 100; backdrop-filter: blur(4px);
}
.modal-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; padding: 24px; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 48px rgba(0,0,0,0.5);
}
.modal-box::before { display: none; }
.modal-title { font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 20px; letter-spacing: -0.01em; }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); cursor: pointer; transition: all 0.12s; font-size: 12px;
}
.modal-close:hover { color: var(--white); border-color: var(--border2); }

/* ── FORM ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.col2 { grid-column: 1/-1; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-lbl { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.form-inp, .form-sel, .form-txta {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 8px 12px;
  font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text);
  outline: none; width: 100%; transition: border-color 0.12s; -webkit-appearance: none;
}
.form-inp:focus, .form-sel:focus { border-color: var(--text2); }
.form-inp::placeholder { color: var(--text3); }
.form-sel { cursor: pointer; color-scheme: dark; }
.form-sel option { background: var(--surface2); }
.form-txta { resize: none; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── COVER PICKER ── */
.cover-results { display: grid; grid-template-columns: repeat(auto-fill,minmax(70px,1fr)); gap: 6px; margin-top: 6px; max-height: 180px; overflow-y: auto; }
.cover-opt { border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; aspect-ratio: 3/4; }
.cover-opt:hover { border-color: var(--text2); }
.cover-opt.sel { border-color: var(--white); }
.cover-opt img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ── YEAR HEADER ── */
.year-header { display: flex; align-items: center; gap: 14px; padding: 4px 0 16px; }
.year-num { font-size: 42px; font-weight: 700; letter-spacing: -0.04em; color: var(--white); line-height: 1; }
.year-meta { display: flex; flex-direction: column; gap: 2px; }
.year-meta-main { font-size: 13px; font-weight: 600; color: var(--text); }
.year-meta-sub { font-size: 11px; color: var(--text3); }
.year-line { flex: 1; height: 1px; background: var(--border); }

/* ── FILTER PILLS ── */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.fpill {
  font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface2); color: var(--text3);
  cursor: pointer; transition: all 0.12s;
}
.fpill:hover { color: var(--text); border-color: var(--border2); }
.fpill.active { background: #f472b6; border-color: #f472b6; color: #fff; font-weight: 600; }

/* ── TOP RATED ── */
.top-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px;
  transition: border-color 0.12s;
}
.top-item:hover { border-color: var(--border2); }
.top-rank { font-size: 20px; font-weight: 700; width: 32px; flex-shrink: 0; color: var(--text3); line-height: 1; letter-spacing: -0.02em; }
.top-rank.gold   { color: #f59e0b; }
.top-rank.silver { color: #9ca3af; }
.top-rank.bronze { color: #b45309; }
.top-cover { width: 36px; height: 48px; border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; background: var(--surface2); }
.top-cover img { width: 100%; height: 100%; object-fit: cover; }

/* ── GOTY ── */
.goty-hero { text-align: center; padding: 32px 0 28px; }
.goty-title { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; color: var(--white); margin-bottom: 6px; }
.goty-sub { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
.goty-winner {
  background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 6px;
}
.goty-winner::before { display: none; }
.goty-winner-cover { width: 72px; height: 96px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: var(--surface2); }
.goty-winner-cover img { width: 100%; height: 100%; object-fit: cover; }
.goty-winner-info { flex: 1; min-width: 0; }
.goty-crown { font-size: 18px; margin-bottom: 4px; display: block; }
.goty-winner-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--white); line-height: 1.2; margin-bottom: 6px; }
.goty-winner-meta { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
.goty-runner {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
}
.goty-runner-cover { width: 32px; height: 42px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: var(--surface2); }
.goty-runner-cover img { width: 100%; height: 100%; object-fit: cover; }

/* ── PLAYER GOTY ── */
.player-goty-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; margin-bottom: 24px; }
.player-goty-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px;
  position: relative;
}
.player-goty-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--pc2); border-radius: var(--radius) var(--radius) 0 0; }
.pgoty-name { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
.pgoty-game { display: flex; align-items: center; gap: 8px; }
.pgoty-cover { width: 32px; height: 42px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: var(--surface2); }
.pgoty-cover img { width: 100%; height: 100%; object-fit: cover; }
.pgoty-title { font-size: 11px; font-weight: 600; color: var(--white); line-height: 1.3; }
.pgoty-none { font-size: 11px; color: var(--text3); }

/* ── COMPARE ── */
.cmp-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 8px; margin-bottom: 20px; }
.cmp-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  position: relative;
}
.cmp-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--pc2); border-radius: var(--radius) var(--radius) 0 0; }
.cmp-name { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
.cmp-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.cmp-row:last-child { border-bottom: none; }
.cmp-key { color: var(--text3); font-size: 11px; }
.cmp-val { font-weight: 600; font-size: 12px; }
.vs-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 8px; overflow-x: auto; }
.vs-title { font-size: 13px; font-weight: 700; color: var(--white); margin-bottom: 12px; }
.vs-row { display: grid; grid-template-columns: 120px repeat(4,1fr); gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); align-items: center; font-size: 12px; }
.vs-row.hdr { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.vs-row:last-child { border-bottom: none; }

/* ── READ ONLY ── */
.readonly-banner {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 16px;
  font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px;
}

/* ── EMPTY ── */
.empty { text-align: center; padding: 48px 20px; }
.empty-icon { font-size: 32px; display: block; margin-bottom: 12px; opacity: 0.3; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.empty-sub { font-size: 12px; color: var(--text3); }

/* ── LOADING / TOAST ── */
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 20px; }
.loading-logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--white); }
.loading-bar { width: 160px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.loading-fill { height: 100%; background: #f472b6; animation: loadfill 1.5s ease infinite; border-radius: 1px; }
@keyframes loadfill { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #f472b6; color: #fff; padding: 8px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 600; z-index: 200;
  box-shadow: 0 4px 24px rgba(244,114,182,0.35); animation: toastIn 0.2s ease; white-space: nowrap;
}
@keyframes toastIn { from{opacity:0;transform:translate(-50%,6px)} to{opacity:1;transform:translate(-50%,0)} }

/* ── SEC LABEL ── */
.sec-label {
  font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(15,15,15,0.95); backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); display: flex;
  padding: 0 0 env(safe-area-inset-bottom, 0);
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 10px 4px; background: none; border: none; cursor: pointer;
  transition: all 0.12s; min-width: 0; position: relative;
}
.bnav-emoji { font-size: 18px; line-height: 1; }
.bnav-label { font-size: 9px; font-weight: 500; color: var(--text3); letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; transition: color 0.12s; }
.bnav-btn.active .bnav-label { color: var(--pc); }
.bnav-btn::before { display: none; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(66px + env(safe-area-inset-bottom, 0px)); right: 20px; z-index: 49;
  width: 48px; height: 48px; border-radius: 50%;
  background: #f472b6; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff;
  box-shadow: 0 4px 20px rgba(244,114,182,0.4); transition: all 0.15s;
}
.fab:hover { transform: scale(1.06); }
.fab:active { transform: scale(0.95); }

/* ── ANIMATIONS ── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.18s ease; }
@keyframes popIn { from{transform:scale(0.97);opacity:0} to{transform:scale(1);opacity:1} }
.pop-in { animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── MOBILE ── */
body { font-size: 13px; }
#root { padding: 0 16px 88px; }
.site-header { padding: 24px 0 18px; margin-bottom: 18px; }
.logo { font-size: 16px; }
.logo-eyebrow { display: none; }
.player-rail { display: none; }
.stat-row { grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 16px; }
.stat-card { padding: 12px 8px; }
.stat-num { font-size: 18px; }
.stat-lbl { font-size: 9px; }
.nav-tabs { padding: 3px; gap: 2px; margin-bottom: 14px; }
.nav-tab { padding: 5px 8px; font-size: 10px; }
.tabs-actions { flex-direction: column; gap: 8px; margin-bottom: 14px; }
.tabs-actions .btn-primary { display: none; }
.game-card { min-height: 76px; margin-bottom: 4px; }
.game-cover { width: 52px; min-width: 52px; }
.game-body { padding: 10px 12px; }
.game-title { font-size: 12px; }
.pill { font-size: 9px; padding: 2px 6px; }
.form-grid { grid-template-columns: 1fr; gap: 12px; }
.col2 { grid-column: 1; }
.modal-box { border-radius: 16px 16px 0 0; max-height: 92vh; }
.modal-bg { align-items: flex-end; padding: 0; }
.modal-title { font-size: 15px; margin-bottom: 16px; }
.cmp-grid { grid-template-columns: 1fr 1fr; }
.player-goty-grid { grid-template-columns: 1fr 1fr; }

}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

const SUPA_URL = 'https://xinmcvrwyoyiwaeaqiww.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpbm1jdnJ3eW95aXdhZWFxaXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NjYyOTgsImV4cCI6MjA4OTA0MjI5OH0.c8CVcQKmqjo5I-mcZHFyMl1nBQUtjLBbAjXXPdblmEc';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const PLAYERS = [
  { id:'greg', label:'Greg', c:'#f472b6', g:'#f472b6', emoji:'🎮' },
  { id:'anth', label:'Anth', c:'#a78bfa', g:'#a78bfa', emoji:'🕹️' },
  { id:'sam',  label:'Sam',  c:'#60a5fa', g:'#60a5fa', emoji:'⚡' },
  { id:'joel', label:'Joel', c:'#34d399', g:'#34d399', emoji:'🔥' },
];
const GENRES=['Action','Adventure','RPG','Strategy','Puzzle','Platformer','Shooter','Sports','Horror','Simulation','Fighting','Racing','Indie','Visual Novel','Other'];
const PLATFORMS=['PC','PlayStation 5','PlayStation 4','Xbox Series X','Xbox One','Nintendo Switch','Mobile','Other'];
const STATUSES=[{id:'playing',label:'Playing'},{id:'beaten',label:'Beaten'},{id:'backlog',label:'Backlog'},{id:'dropped',label:'Dropped'}];
const CUR_YEAR = new Date().getFullYear();
const RAWG_KEY = '1934277a3e1e4975a7d5ed786296caea';
const uid = () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
  const r = Math.random() * 16 | 0;
  return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
});

async function fetchCovers(q) {
  try {
    const r = await fetch(`https://api.rawg.io/api/games?key=${RAWG_KEY}&search=${encodeURIComponent(q)}&page_size=6`);
    const d = await r.json();
    return (d.results||[]).filter(g=>g.background_image).map(g=>({id:g.id,name:g.name,cover:g.background_image}));
  } catch { return []; }
}

function applyTheme(p) {
  document.documentElement.style.setProperty('--pc', p.c);
  document.documentElement.style.setProperty('--pg', p.g);
}

function Stars({rating, onRate, small}) {
  const [hover, setHover] = useState(0);
  const lit = hover||rating;
  return <span className="stars">{[1,2,3,4,5].map(n=>(
    <span key={n} className={`star${small?' star-sm':''}${n<=lit?' lit':''}`}
      onClick={()=>onRate&&onRate(n===rating?0:n)}
      onMouseEnter={()=>onRate&&setHover(n)} onMouseLeave={()=>onRate&&setHover(0)}>★</span>
  ))}</span>;
}

function Cover({url, title}) {
  const [ok, setOk] = useState(false);
  const [err, setErr] = useState(false);
  if (!url||err) return <div className="game-cover-ph">{title?.[0]?.toUpperCase()||'?'}</div>;
  return <>
    {!ok&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%'}}><div className="cover-spin"/></div>}
    <img src={url} alt={title} onLoad={()=>setOk(true)} onError={()=>setErr(true)} style={{display:ok?'block':'none',width:'100%',height:'100%',objectFit:'cover'}}/>
  </>;
}

function Modal({title, children, onClose}) {
  return <div className="modal-bg" onClick={e=>e.target.classList.contains('modal-bg')&&onClose()}>
    <div className="modal-box pop-in" style={{position:'relative'}}>
      <button className="modal-close" onClick={onClose}>✕</button>
      <div className="modal-title">{title}</div>
      {children}
    </div>
  </div>;
}

function AddGameModal({player, onSave, onClose, editGame}) {
  const [f, setF] = useState(editGame||{title:'',status:'playing',genre:'RPG',platform:'PC',hours:'',rating:0,year:CUR_YEAR,notes:'',cover_url:''});
  const [covers, setCovers] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selCover, setSelCover] = useState(editGame?.cover_url||'');
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState('');
  const U = (k,v)=>setF(p=>({...p,[k]:v}));

  const search = async()=>{
    if(!f.title.trim()) return;
    setSearching(true);
    const r = await fetchCovers(f.title);
    setCovers(r); setSearching(false);
  };

  const handleSave = async () => {
    if(!f.title.trim()) return;
    setSaving(true); setSaveError('');
    try {
      const gameData = {
        title: f.title.trim(),
        status: f.status,
        genre: f.genre,
        platform: f.platform,
        hours: f.hours === '' || f.hours === null || f.hours === undefined ? null : parseFloat(f.hours) || null,
        rating: !f.rating ? null : parseInt(f.rating) || null,
        year: f.year ? parseInt(f.year) : null,
        notes: f.notes || null,
        cover_url: selCover || null,
        player: player.id,
      };
      if (editGame && editGame.id) gameData.id = editGame.id;
      else gameData.id = uid();
      await onSave(gameData);
      onClose();
    } catch(e) {
      setSaveError(e?.message || 'Save failed');
      setSaving(false);
    }
  };

  return <Modal title={editGame?'Edit game':'Add game'} onClose={onClose}>
    <div className="form-grid">
      <div className="form-group col2">
        <label className="form-lbl">Title</label>
        <div style={{display:'flex',gap:'8px'}}>
          <input className="form-inp" style={{flex:1}} value={f.title} onChange={e=>U('title',e.target.value)} placeholder="Game title…" autoFocus onKeyDown={e=>e.key==='Enter'&&search()}/>
          <button className="btn btn-sm" onClick={search} disabled={searching}>{searching?'…':'Search art'}</button>
        </div>
      </div>
      {covers.length>0&&<div className="form-group col2">
        <label className="form-lbl">Cover art</label>
        <div className="cover-results">
          {covers.map(r=><div key={r.id} className={`cover-opt${selCover===r.cover?' sel':''}`} onClick={()=>setSelCover(r.cover)}><img src={r.cover} alt={r.name} loading="lazy"/></div>)}
        </div>
        {selCover&&<div style={{fontSize:11,color:'#22c55e',marginTop:4}}>✓ Cover selected</div>}
      </div>}
      <div className="form-group">
        <label className="form-lbl">Status</label>
        <select className="form-sel" value={f.status} onChange={e=>U('status',e.target.value)}>
          {STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label className="form-lbl">Year</label>
        <input className="form-inp" type="number" value={f.year} onChange={e=>U('year',parseInt(e.target.value)||CUR_YEAR)} min="1970" max="2040"/>
      </div>
      <div className="form-group">
        <label className="form-lbl">Genre</label>
        <select className="form-sel" value={f.genre} onChange={e=>U('genre',e.target.value)}>
          {GENRES.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label className="form-lbl">Platform</label>
        <select className="form-sel" value={f.platform} onChange={e=>U('platform',e.target.value)}>
          {PLATFORMS.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label className="form-lbl">Hours played</label>
        <input className="form-inp" type="number" value={f.hours} onChange={e=>U('hours',e.target.value)} placeholder="0" min="0"/>
      </div>
      <div className="form-group">
        <label className="form-lbl">Rating</label>
        <div style={{paddingTop:'6px'}}><Stars rating={f.rating} onRate={v=>U('rating',v)}/></div>
      </div>
      <div className="form-group col2">
        <label className="form-lbl">Notes</label>
        <textarea className="form-txta" rows={2} value={f.notes} onChange={e=>U('notes',e.target.value)} placeholder="Any thoughts…"/>
      </div>
    </div>
    {saveError&&<div style={{color:'#f87171',fontSize:12,marginTop:8}}>⚠ {saveError}</div>}
    <div className="modal-actions">
      <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
        {saving?'Saving…':editGame?'Save changes':'Add game'}
      </button>
    </div>
  </Modal>;
}

function GameCard({game, player, onEdit, onDelete, onRate, readOnly}) {
  const SC = {playing:'pill-playing',beaten:'pill-beaten',backlog:'pill-backlog',dropped:'pill-dropped'};
  return <div className="game-card fade-in">
    <div className="game-accent" style={{background:player.c}}/>
    <div className="game-cover"><Cover url={game.cover_url} title={game.title}/></div>
    <div className="game-body">
      <div>
        <div className="game-title">{game.title}</div>
        <div className="game-pills">
          <span className={`pill ${SC[game.status]||''}`}>{STATUSES.find(s=>s.id===game.status)?.label||game.status}</span>
          <span className="pill">{game.genre}</span>
          <span className="pill">{game.platform}</span>
          {game.year&&<span className="pill">{game.year}</span>}
          {game.hours?<span className="pill">{game.hours}h</span>:null}
        </div>
        {game.notes&&<div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',marginBottom:4,lineHeight:1.4}}>{game.notes}</div>}
      </div>
      <div className="game-bottom">
        <Stars rating={game.rating||0} onRate={readOnly?null:onRate} small/>
        {!readOnly&&<div className="game-actions">
          <button className="btn btn-sm btn-ghost" onClick={onEdit}>Edit</button>
          <button className="btn btn-sm btn-danger" onClick={onDelete}>Remove</button>
        </div>}
      </div>
    </div>
  </div>;
}

function PlayerView({player, games, onAdd, onUpdate, onDelete, isOwn}) {
  const [tab, setTab] = useState('all');
  const [showAdd, setShowAdd] = useState(false);
  const [editGame, setEditGame] = useState(null);
  const [filterYear, setFilterYear] = useState('all');

  const beaten = games.filter(g=>g.status==='beaten');
  const playing = games.filter(g=>g.status==='playing');
  const hours = Math.round(games.reduce((s,g)=>s+(parseFloat(g.hours)||0),0));
  const rated = games.filter(g=>g.rating>0);
  const avg = rated.length?(rated.reduce((s,g)=>s+g.rating,0)/rated.length).toFixed(1):'—';
  const years = [...new Set(games.map(g=>g.year||CUR_YEAR))].sort((a,b)=>b-a);

  const TABS=[{id:'all',label:'All'},{id:'playing',label:'Playing'},{id:'beaten',label:'Beaten'},{id:'backlog',label:'Backlog'},{id:'by-year',label:'By year'},{id:'top',label:'Top rated'}];

  let shown = games.filter(g=>{
    if(tab==='playing') return g.status==='playing';
    if(tab==='beaten')  return g.status==='beaten';
    if(tab==='backlog') return g.status==='backlog';
    return true;
  });
  if(filterYear!=='all') shown=shown.filter(g=>String(g.year||CUR_YEAR)===filterYear);

  const top = [...games].filter(g=>g.rating>0).sort((a,b)=>b.rating-a.rating||(b.hours||0)-(a.hours||0)).slice(0,10);

  return <div className="fade-in">
    {!isOwn&&<div className="readonly-banner">👀 Viewing {player.label}'s collection</div>}
    <div className="stat-row">
      {[{n:games.length,l:'Games'},{n:beaten.length,l:'Beaten'},{n:playing.length,l:'Playing'},{n:hours,l:'Hours'},{n:avg,l:'Avg'}].map(s=>(
        <div key={s.l} className="stat-card"><div className="stat-num">{s.n}</div><div className="stat-lbl">{s.l}</div></div>
      ))}
    </div>
    <div className="tabs-actions">
      <div className="nav-tabs">
        {TABS.map(t=><button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>
      {isOwn&&<button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Add game</button>}
    </div>
    {tab==='by-year'&&<div className="filter-row">
      <button className={`fpill${filterYear==='all'?' active':''}`} onClick={()=>setFilterYear('all')}>All years</button>
      {years.map(y=><button key={y} className={`fpill${filterYear===String(y)?' active':''}`} onClick={()=>setFilterYear(String(y))}>{y}</button>)}
    </div>}
    {tab==='top'
      ? top.length
        ? top.map((g,i)=>{
            const ranks=['gold','silver','bronze'];
            return <div key={g.id} className="top-item">
              <div className={`top-rank${i<3?' '+ranks[i]:''}`}>{i+1}</div>
              <div className="top-cover">{g.cover_url&&<img src={g.cover_url} alt={g.title}/>}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,color:'var(--white)',marginBottom:3}}>{g.title}</div>
                <Stars rating={g.rating} small/>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{g.platform} · {g.year||CUR_YEAR}{g.hours?' · '+g.hours+'h':''}</div>
              </div>
            </div>;
          })
        : <div className="empty"><span className="empty-icon">⭐</span><div className="empty-title">No rated games yet</div><div className="empty-sub">Rate games to build your top list</div></div>
      : shown.length
        ? shown.map(g=><GameCard key={g.id} game={g} player={player}
            onEdit={()=>setEditGame(g)}
            onDelete={()=>{ if(confirm('Remove this game?')) onDelete(g.id); }}
            onRate={v=>onUpdate({...g,rating:v})}
          />)
        : <div className="empty"><span className="empty-icon">🎮</span><div className="empty-title">Nothing here yet</div><div className="empty-sub">Add some games to get started</div></div>
    }
    {showAdd&&<AddGameModal player={player} onClose={()=>setShowAdd(false)} onSave={onAdd}/>}
    {editGame&&<AddGameModal player={player} editGame={editGame} onClose={()=>setEditGame(null)} onSave={onUpdate}/>}
  </div>;
}

function GotyView({allGames}) {
  const CUR = CUR_YEAR;
  const [selYear, setSelYear] = useState(CUR);
  const allYears = [...new Set(allGames.map(g=>g.year||CUR))].sort((a,b)=>b-a);
  if(!allYears.includes(selYear)&&allYears.length) setSelYear(allYears[0]);

  const byPlayer = PLAYERS.map(p=>{
    const gs=allGames.filter(g=>g.player===p.id&&(g.year||CUR)===selYear&&g.rating>0);
    const top=[...gs].sort((a,b)=>b.rating-a.rating)[0]||null;
    return {...p,top};
  });

  const allRated=allGames.filter(g=>(g.year||CUR)===selYear&&g.rating>0);
  const overall=[...allRated].sort((a,b)=>b.rating-a.rating);
  const winner=overall[0]||null;
  const runners=overall.slice(1,4);

  return <div className="fade-in">
    <div className="goty-hero">
      <div className="goty-title">Game of the Year</div>
      <div className="goty-sub">Community picks</div>
      <div style={{display:'flex',gap:'6px',justifyContent:'center',marginTop:'16px',flexWrap:'wrap'}}>
        {allYears.map(y=><button key={y} className={`fpill${selYear===y?' active':''}`} onClick={()=>setSelYear(y)}>{y}</button>)}
      </div>
    </div>
    {winner ? <>
      <div className="sec-label">Winner — {selYear}</div>
      <div className="goty-winner">
        <div className="goty-winner-cover">{winner.cover_url&&<img src={winner.cover_url} alt={winner.title}/>}</div>
        <div className="goty-winner-info">
          <span className="goty-crown">🏆</span>
          <div className="goty-winner-title">{winner.title}</div>
          <div className="goty-winner-meta">{winner.platform} · {winner.genre}</div>
          <Stars rating={winner.rating} small/>
        </div>
      </div>
      {runners.length>0&&<><div className="sec-label" style={{marginTop:'20px'}}>Runners up</div>
      {runners.map(g=><div key={g.id} className="goty-runner">
        <div className="goty-runner-cover">{g.cover_url&&<img src={g.cover_url} alt={g.title}/>}</div>
        <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13,color:'var(--white)'}}>{g.title}</div><Stars rating={g.rating} small/></div>
      </div>)}</>}
    </> : <div className="empty"><span className="empty-icon">🏆</span><div className="empty-title">No rated games in {selYear}</div><div className="empty-sub">Rate games to crown a winner</div></div>}
    <div className="sec-label" style={{marginTop:'28px'}}>Each player's pick — {selYear}</div>
    <div className="player-goty-grid">
      {byPlayer.map(p=>(
        <div key={p.id} className="player-goty-card" style={{'--pc2':p.c}}>
          <div className="pgoty-name" style={{color:p.c}}>{p.emoji} {p.label}</div>
          {p.top ? <div className="pgoty-game">
            <div className="pgoty-cover">{p.top.cover_url&&<img src={p.top.cover_url} alt={p.top.title}/>}</div>
            <div><div className="pgoty-title">{p.top.title}</div><Stars rating={p.top.rating} small/></div>
          </div> : <div className="pgoty-none">No rated games</div>}
        </div>
      ))}
    </div>
    <div className="sec-label">All games — {selYear}</div>
    {PLAYERS.map(p=>{
      const pg=allGames.filter(g=>g.player===p.id&&(g.year||CUR_YEAR)===selYear).sort((a,b)=>(b.rating||0)-(a.rating||0));
      if(!pg.length) return null;
      return <div key={p.id} style={{marginBottom:'20px'}}>
        <div className="sec-label" style={{color:p.c}}>{p.emoji} {p.label} — {pg.length} game{pg.length!==1?'s':''}</div>
        {pg.map(g=><GameCard key={g.id} game={g} player={p} readOnly={true}/>)}
      </div>;
    })}
    {!allGames.filter(g=>(g.year||CUR_YEAR)===selYear).length&&<div className="empty"><span className="empty-icon">🎮</span><div className="empty-title">No games in {selYear}</div></div>}
  </div>;
}

function CompareView({allGames}) {
  const stats = PLAYERS.map(p=>{
    const gs=allGames.filter(g=>g.player===p.id);
    const beaten=gs.filter(g=>g.status==='beaten').length;
    const playing=gs.filter(g=>g.status==='playing').length;
    const hours=Math.round(gs.reduce((s,g)=>s+(parseFloat(g.hours)||0),0));
    const rated=gs.filter(g=>g.rating>0);
    const avg=rated.length?(rated.reduce((s,g)=>s+g.rating,0)/rated.length).toFixed(1):'—';
    const top=[...gs].filter(g=>g.rating>0).sort((a,b)=>b.rating-a.rating)[0];
    const genres={};gs.forEach(g=>{genres[g.genre]=(genres[g.genre]||0)+1;});
    const fave=Object.entries(genres).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
    return {...p,total:gs.length,beaten,playing,hours,avg,top,fave};
  });
  const allYears=[...new Set(allGames.map(g=>g.year||CUR_YEAR))].sort((a,b)=>b-a);
  const metrics=[
    {l:'Total',   f:s=>s.total},
    {l:'Beaten',  f:s=>s.beaten},
    {l:'Playing', f:s=>s.playing},
    {l:'Hours',   f:s=>s.hours, fmt:v=>v+'h'},
    {l:'Avg',     f:s=>parseFloat(s.avg)||0, fmt:(_,s)=>s.avg},
  ];
  return <div className="fade-in">
    <div style={{padding:'28px 0 24px',textAlign:'center'}}>
      <div style={{fontSize:22,fontWeight:700,letterSpacing:'-0.02em',color:'var(--white)',marginBottom:4}}>Head to Head</div>
      <div style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:500}}>Stats across all players</div>
    </div>
    <div className="cmp-grid">
      {stats.map(p=>(
        <div key={p.id} className="cmp-card" style={{'--pc2':p.c}}>
          <div className="cmp-name" style={{color:p.c}}>{p.emoji} {p.label}</div>
          {[['Games',p.total],['Beaten',p.beaten],['Playing',p.playing],['Hours',p.hours+'h'],['Avg',p.avg],['Genre',p.fave]].map(([k,v])=>(
            <div key={k} className="cmp-row"><span className="cmp-key">{k}</span><span className="cmp-val" style={{color:p.c}}>{v}</span></div>
          ))}
          {p.top&&<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Top rated</div>
            {p.top.cover_url&&<img src={p.top.cover_url} style={{width:'100%',height:60,objectFit:'cover',borderRadius:6,marginBottom:6}} alt={p.top.title}/>}
            <div style={{fontWeight:600,fontSize:12,color:'var(--white)',marginBottom:3}}>{p.top.title}</div>
            <Stars rating={p.top.rating} small/>
          </div>}
        </div>
      ))}
    </div>
    <div className="vs-wrap">
      <div className="vs-title">Rankings</div>
      <div className="vs-row hdr"><span>Metric</span>{PLAYERS.map(p=><span key={p.id} style={{color:p.c}}>{p.label}</span>)}</div>
      {metrics.map(({l,f,fmt})=>{
        const vals=stats.map(f); const max=Math.max(...vals);
        return <div key={l} className="vs-row">
          <span style={{color:'var(--text3)',fontSize:11}}>{l}</span>
          {stats.map((s,i)=>{const v=vals[i];const isM=v===max&&max>0;return(
            <span key={s.id} style={{fontWeight:isM?700:400,color:isM?s.c:'var(--text3)',fontSize:isM?'13px':'12px'}}>
              {fmt?fmt(v,s):v}{isM?' ↑':''}
            </span>
          );})}
        </div>;
      })}
    </div>
    {allYears.length>0&&<div className="vs-wrap">
      <div className="vs-title">By Year</div>
      <div className="vs-row hdr"><span>Year</span>{PLAYERS.map(p=><span key={p.id} style={{color:p.c}}>{p.label}</span>)}</div>
      {allYears.map(yr=>(
        <div key={yr} className="vs-row">
          <span style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>{yr}</span>
          {PLAYERS.map(p=>{
            const cnt=allGames.filter(g=>g.player===p.id&&(g.year||CUR_YEAR)===yr).length;
            const bt=allGames.filter(g=>g.player===p.id&&(g.year||CUR_YEAR)===yr&&g.status==='beaten').length;
            return <span key={p.id} style={{fontSize:12,fontWeight:cnt>0?600:400,color:cnt>0?p.c:'var(--text3)'}}>{cnt>0?`${cnt} (${bt}✓)`:'—'}</span>;
          })}
        </div>
      ))}
    </div>}
  </div>;
}

function FabAdd({ player, onAdd }) {
  const [open, setOpen] = useState(false);
  return <>
    <button className="fab" onClick={()=>setOpen(true)}>+</button>
    {open&&<AddGameModal player={player} onClose={()=>setOpen(false)} onSave={onAdd}/>}
  </>;
}

function App() {
  const [active, setActive] = useState('greg');
  const [allGames, setAllGames] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState('');

  const showToast = msg=>{ setToast(msg); setTimeout(()=>setToast(''),2500); };

  const load = async()=>{
    const {data,error}=await sb.from('games').select('*').order('created_at',{ascending:false});
    if(!error) setAllGames(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  useEffect(()=>{
    const sub=sb.channel('games').on('postgres_changes',{event:'*',schema:'public',table:'games'},()=>load()).subscribe();
    return ()=>sb.removeChannel(sub);
  },[]);

  useEffect(()=>{
    const p = active==='goty'||active==='compare'
      ? {c:'#ffffff',g:'#ffffff'}
      : PLAYERS.find(p=>p.id===active);
    if(p) applyTheme(p);
  },[active]);

  const cp = PLAYERS.find(p=>p.id===active);
  const pg = id=>allGames.filter(g=>g.player===id);

  const onAdd = async g=>{
    const {error}=await sb.from('games').insert([g]);
    if(error) { console.error('Insert error:', error); throw new Error(error.message||'Insert failed'); }
    showToast('Game added ✓');
    load();
  };

  const onUpdate = async g=>{
    const {error}=await sb.from('games').update(g).eq('id',g.id);
    if(error) { console.error('Update error:', error); throw new Error(error.message||'Update failed'); }
    showToast('Saved ✓');
  };

  const onDelete = async id=>{
    await sb.from('games').delete().eq('id',id);
    showToast('Removed');
  };

  if(loading) return <div className="loading-screen">
    <div className="loading-logo">Playlog</div>
    <div className="loading-bar"><div className="loading-fill"/></div>
  </div>;

  const RAIL = [
    ...PLAYERS,
    {id:'goty',    label:'GOTY',    c:'#ffffff', g:'#ffffff', emoji:'🏆'},
    {id:'compare', label:'Compare', c:'#ffffff', g:'#ffffff', emoji:'📊'},
  ];

  return <div>
    <div className="site-header">
      <div className="header-inner">
        <div className="logo-block">
          <div className="logo-eyebrow"></div>
          <div className="logo">Play<span>log</span></div>
        </div>
        <div className="header-badge">
          <div className="header-badge-name">{active==='goty'?'GOTY':active==='compare'?'All':cp?.label||''}</div>
          <div className="header-badge-sub">{active==='goty'?'Awards':active==='compare'?'Players':pg(active).length+' games'}</div>
        </div>
      </div>
    </div>

    <div className="player-rail">
      {RAIL.map(p=>(
        <button key={p.id} className={`prail-btn${active===p.id?' active':''}`} onClick={()=>setActive(p.id)}>
          <span className="prail-dot" style={active===p.id?{background:p.c}:{}}/>
          {p.emoji} {p.label}
        </button>
      ))}
    </div>

    {active==='goty'    && <GotyView allGames={allGames}/>}
    {active==='compare' && <CompareView allGames={allGames}/>}
    {cp&&<PlayerView key={active} player={cp} games={pg(active)} isOwn={true} onAdd={onAdd} onUpdate={onUpdate} onDelete={onDelete}/>}
    {cp&&<FabAdd player={cp} onAdd={onAdd}/>}

    <nav className="bottom-nav">
      {RAIL.map(p=>(
        <button key={p.id} className={`bnav-btn${active===p.id?' active':''}`} onClick={()=>setActive(p.id)}>
          <span className="bnav-emoji">{p.emoji}</span>
          <span className="bnav-label" style={active===p.id?{color:p.c}:{}}>{p.label}</span>
        </button>
      ))}
    </nav>

    {toast&&<div className="toast">{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

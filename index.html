<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PLAYLOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Share+Tech+Mono&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Y2K JAPANESE CYBER ──────────────────────────────────────────────────── */
:root {
  --void:    #0a0010;
  --space:   #0d0018;
  --deep:    #100020;
  --panel:   #140028;
  --lift:    #1a0035;
  --raised:  #220045;

  --glass:   rgba(255, 20, 180, 0.06);
  --glass2:  rgba(100, 20, 200, 0.12);
  --frost:   rgba(255, 100, 220, 0.07);
  --frost2:  rgba(255, 100, 220, 0.14);

  --text:    #ffccee;
  --text2:   #cc88bb;
  --text3:   #884466;
  --white:   #fff0f8;

  --b1:      rgba(255,60,200,0.1);
  --b2:      rgba(255,60,200,0.2);
  --b3:      rgba(255,60,200,0.4);
  --bhi:     rgba(255,60,200,0.7);

  /* Core palette */
  --pink:    #ff2d9b;
  --pink2:   #ff79c6;
  --pink3:   #ffb3e0;
  --blue:    #00d4ff;
  --blue2:   #0099ee;
  --purple:  #cc44ff;
  --silver:  #c8d8f0;
  --chrome:  linear-gradient(180deg, #ffffff 0%, #c0d0f0 30%, #8090c0 60%, #404870 100%);
  --orange:  #ff8c00;
  --yellow:  #ffe000;
  --green:   #00ff9d;

  /* Player colours */
  --greg-c: #ff2d9b; --greg-g: linear-gradient(135deg,#ff2d9b,#ff79c6);
  --anth-c: #cc44ff; --anth-g: linear-gradient(135deg,#cc44ff,#7722cc);
  --sam-c:  #00d4ff; --sam-g:  linear-gradient(135deg,#00d4ff,#0055ff);
  --joel-c: #ff8c00; --joel-g: linear-gradient(135deg,#ff8c00,#ffcc00);

  --pc: var(--pink);
  --pg: var(--greg-g);

  --scanline: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 4px
  );

  /* Chrome text gradient */
  --chrome-grad: linear-gradient(180deg,#fff 0%,#ffccee 25%,#ff2d9b 55%,#990066 100%);
  --chrome-bright: #fff0f8;
  --chrome-light: #ffccee;
  --chrome-steel: #cc88bb;
  --chrome-silver: #ffaadd;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 16px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient glow */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(255,0,150,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(0,180,255,0.1) 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 50% 50%, rgba(100,0,200,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* Subtle pixel grid */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,0,150,0.03) 3px, rgba(255,0,150,0.03) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,180,255,0.02) 3px, rgba(0,180,255,0.02) 4px);
  pointer-events: none; z-index: 0;
}

#root { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 1.25rem 6rem; }

/* ── HEADER ──────────────────────────────────────────────────────────────── */
.site-header {
  padding: 2rem 0 1.5rem;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem;
  border-bottom: 1px solid var(--b2);
  position: relative; margin-bottom: 1.75rem;
}
.site-header::after {
  content: '';
  position: absolute; bottom: -1px; left: 0;
  width: 200px; height: 2px;
  background: linear-gradient(90deg, var(--pink), var(--blue), transparent);
  box-shadow: 0 0 16px var(--pink), 0 0 32px rgba(0,212,255,0.3);
}
.logo-eyebrow {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing: 0.4em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
}
.logo {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 3rem; font-weight: 400;
  letter-spacing: 0.06em; line-height: 1;
  color: var(--white);
  text-shadow: 0 0 30px var(--pink), 0 0 60px rgba(255,45,155,0.3), 3px 3px 0 rgba(0,212,255,0.4);
  position: relative;
}
.logo::after {
  content: 'PLAYLOG';
  position: absolute; inset: 0;
  background: var(--chrome-grad);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; opacity: 0.95;
}
.header-badge { text-align: right; }
.header-badge-name {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 0.9rem; letter-spacing: 0.1em;
  color: var(--pc); text-shadow: 0 0 12px var(--pc); display: block;
}
.header-badge-sub {
  font-size: 10px; font-family: 'Share Tech Mono', monospace;
  letter-spacing: 0.15em; color: var(--text3);
}

/* ── PLAYER RAIL ─────────────────────────────────────────────────────────── */
.player-rail {
  display: flex; gap: 3px;
  background: var(--glass);
  border: 1px solid var(--b2); border-radius: 16px;
  padding: 5px; margin-bottom: 2rem;
  overflow-x: auto; scrollbar-width: none;
  box-shadow: 0 0 0 1px var(--b1) inset, 0 4px 24px rgba(255,0,150,0.15),
    inset 0 1px 0 rgba(255,150,220,0.1);
  background-image: var(--scanline); background-color: var(--glass);
}
.player-rail::-webkit-scrollbar { display: none; }
.prail-btn {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 12px; font-weight: 800; letter-spacing: 0.04em;
  padding: 0.5rem 1.2rem; border-radius: 12px; border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
  display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0;
}
.prail-btn:hover { color: var(--text2); background: var(--frost2); }
.prail-btn.active {
  background: var(--pg); color: #fff; font-weight: 800;
  box-shadow: 0 0 20px var(--pc), 0 2px 8px rgba(0,0,0,0.4);
  text-shadow: 0 0 8px rgba(255,255,255,0.5);
}
.prail-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.prail-btn:not(.active) .prail-dot { background: var(--text3); }
.prail-btn.active .prail-dot { background: rgba(255,255,255,0.9); box-shadow: 0 0 5px #fff; }

/* ── STAT CARDS ──────────────────────────────────────────────────────────── */
.stat-row { display: grid; grid-template-columns: repeat(auto-fit,minmax(100px,1fr)); gap: 6px; margin-bottom: 1.75rem; }
.stat-card {
  background: var(--glass);
  border: 1px solid var(--b2); border-radius: 16px;
  padding: 1rem 0.875rem; text-align: center;
  position: relative; overflow: hidden;
  box-shadow: 0 4px 16px rgba(255,0,150,0.1), inset 0 1px 0 rgba(255,150,220,0.1);
  background-image: var(--scanline); background-color: var(--glass);
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--pg); box-shadow: 0 0 10px var(--pc);
}
.stat-card::after {
  content: ''; position: absolute;
  top: -20px; right: -20px;
  width: 60px; height: 60px;
  background: radial-gradient(circle, rgba(255,45,155,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
.stat-num {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 2rem; letter-spacing: 0.02em;
  color: var(--pc); text-shadow: 0 0 20px var(--pc);
  line-height: 1; margin-bottom: 4px;
}
.stat-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text3);
}

/* ── NAV TABS ────────────────────────────────────────────────────────────── */
.nav-tabs {
  display: flex; gap: 2px;
  background: var(--glass); border: 1px solid var(--b2); border-radius: 12px;
  padding: 3px; margin-bottom: 1.5rem; overflow-x: auto; scrollbar-width: none;
  box-shadow: 0 2px 12px rgba(255,0,150,0.1), inset 0 1px 0 rgba(255,150,220,0.06);
  background-image: var(--scanline); background-color: var(--glass);
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  padding: 0.4rem 0.9rem; border-radius: 9px; border: none;
  background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text2); background: var(--frost); }
.nav-tab.active { background: var(--pg); color: #fff; font-weight: 800; box-shadow: 0 0 12px var(--pc); }

/* ── BUTTONS ─────────────────────────────────────────────────────────────── */
.btn {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  padding: 0.45rem 1rem; border-radius: 10px; border: 1px solid var(--b2);
  background: var(--glass); color: var(--text2); cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 0.3rem; white-space: nowrap;
  box-shadow: 0 2px 8px rgba(255,0,150,0.1), inset 0 1px 0 rgba(255,150,220,0.06);
}
.btn:hover { border-color: var(--b3); color: var(--text); background: var(--frost2); box-shadow: 0 0 12px rgba(255,45,155,0.2); }
.btn-primary {
  background: var(--pg); border-color: transparent; color: #fff; font-weight: 800;
  box-shadow: 0 0 20px var(--pc), 0 4px 16px rgba(0,0,0,0.4);
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 0 30px var(--pc), 0 6px 20px rgba(0,0,0,0.4); }
.btn-danger { color: #ff4488; border-color: rgba(255,68,136,0.25); background: rgba(255,68,136,0.06); }
.btn-danger:hover { background: rgba(255,68,136,0.14); border-color: #ff4488; box-shadow: 0 0 10px rgba(255,68,136,0.3); }
.btn-sm { padding: 0.25rem 0.6rem; font-size: 10px; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text3); box-shadow: none; }
.btn-ghost:hover { color: var(--text2); background: var(--frost); }

/* ── GAME CARD ───────────────────────────────────────────────────────────── */
.game-card {
  background: var(--glass);
  border: 1px solid var(--b2); border-radius: 16px;
  overflow: hidden; margin-bottom: 6px; display: flex; min-height: 96px;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  box-shadow: 0 2px 16px rgba(255,0,150,0.08), inset 0 1px 0 rgba(255,150,220,0.08);
  background-image: var(--scanline); background-color: var(--glass); position: relative;
}
.game-card:hover {
  transform: translateY(-2px); border-color: var(--b3);
  box-shadow: 0 0 24px var(--pc), 0 8px 32px rgba(0,0,0,0.5);
}
.game-accent { width: 4px; min-width: 4px; background: var(--pg); flex-shrink: 0; box-shadow: 0 0 8px var(--pc); border-radius: 16px 0 0 16px; }
.game-cover { width: 68px; min-width: 68px; background: var(--deep); flex-shrink: 0; overflow: hidden; position: relative; }
.game-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.game-cover-ph {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: 'Dela Gothic One', sans-serif; font-size: 1.6rem; color: var(--text3);
  background: linear-gradient(135deg, var(--deep), var(--panel));
}
.cover-spin { width: 16px; height: 16px; border: 2px solid var(--b2); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.7s linear infinite; }
.game-body { padding: 0.875rem 1rem; flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
.game-title { font-family: 'M PLUS Rounded 1c', sans-serif; font-weight: 800; font-size: 14px; color: var(--white); line-height: 1.2; margin-bottom: 0.4rem; }
.game-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.4rem; align-items: center; }
.pill {
  font-family: 'Share Tech Mono', monospace; font-size: 9px;
  padding: 0.15rem 0.5rem; border-radius: 20px;
  background: var(--frost); color: var(--text3); border: 1px solid var(--b1); letter-spacing: 0.05em;
}
.pill-playing { background: rgba(255,140,0,0.12); color: var(--orange); border-color: rgba(255,140,0,0.3); text-shadow: 0 0 6px var(--orange); }
.pill-beaten  { background: rgba(0,255,157,0.1);  color: var(--green);  border-color: rgba(0,255,157,0.3); text-shadow: 0 0 6px var(--green); }
.pill-backlog { background: var(--frost); color: var(--text3); }
.pill-dropped { background: rgba(255,68,136,0.1); color: #ff4488; border-color: rgba(255,68,136,0.25); }
.game-meta { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text3); display: flex; gap: 0.5rem; flex-wrap: wrap; letter-spacing: 0.03em; }
.game-bottom { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.4rem; }
.game-actions { display: flex; gap: 0.3rem; }

/* ── STARS ───────────────────────────────────────────────────────────────── */
.stars { display: inline-flex; gap: 2px; }
.star { font-size: 13px; cursor: pointer; transition: transform 0.1s; color: var(--raised); }
.star:hover { transform: scale(1.35); color: var(--yellow); }
.star.lit { color: var(--yellow); text-shadow: 0 0 8px var(--yellow); }
.star-sm { font-size: 11px; }

/* ── MODAL ───────────────────────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(10,0,20,0.88);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem 1rem; z-index: 100; backdrop-filter: blur(10px);
}
.modal-box {
  background: var(--glass2); border: 1px solid var(--b3); border-radius: 20px;
  padding: 1.75rem 1.5rem; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 0 50px rgba(255,45,155,0.3), 0 0 100px rgba(0,212,255,0.15), 0 30px 80px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,150,220,0.15);
  position: relative; background-image: var(--scanline); background-color: var(--glass2);
}
.modal-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--pink), var(--blue), var(--purple), var(--pink));
  background-size: 200% 100%; animation: shimmer 3s linear infinite;
  box-shadow: 0 0 16px var(--pink); border-radius: 20px 20px 0 0;
}
.modal-title {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 1.4rem; letter-spacing: 0.06em; color: var(--white); margin-bottom: 1.5rem;
  text-shadow: 0 0 20px var(--pink), 2px 2px 0 rgba(0,212,255,0.3);
}
.modal-close {
  position: absolute; top: 1.1rem; right: 1.1rem;
  background: var(--frost); border: 1px solid var(--b2); border-radius: 50%;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  color: var(--text2); cursor: pointer; transition: all 0.15s; font-size: 0.9rem;
}
.modal-close:hover { background: var(--frost2); color: var(--white); border-color: var(--pink); box-shadow: 0 0 8px var(--pink); }

/* ── FORM ────────────────────────────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
.col2 { grid-column: 1/-1; }
.form-group { display: flex; flex-direction: column; gap: 0.35rem; }
.form-lbl { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); }
.form-inp, .form-sel, .form-txta {
  background: rgba(20,0,40,0.7); border: 1px solid var(--b2); border-radius: 10px;
  padding: 0.55rem 0.75rem; font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 13px; color: var(--text); outline: none; width: 100%;
  transition: border-color 0.15s, box-shadow 0.15s; -webkit-appearance: none;
}
.form-inp:focus, .form-sel:focus {
  border-color: var(--pink); box-shadow: 0 0 0 2px rgba(255,45,155,0.15), 0 0 14px rgba(255,45,155,0.2);
}
.form-inp::placeholder { color: var(--text3); }
.form-sel { cursor: pointer; color-scheme: dark; }
.form-sel option { background: var(--deep); color: var(--text); }
.form-txta { resize: none; line-height: 1.6; }
.modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem; }

/* ── COVER PICKER ────────────────────────────────────────────────────────── */
.cover-results { display: grid; grid-template-columns: repeat(auto-fill,minmax(76px,1fr)); gap: 0.4rem; margin-top: 0.5rem; max-height: 190px; overflow-y: auto; }
.cover-opt { border-radius: 10px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; aspect-ratio: 3/4; }
.cover-opt:hover { border-color: var(--pink); transform: scale(1.04); box-shadow: 0 0 12px var(--pink); }
.cover-opt.sel { border-color: var(--pink); box-shadow: 0 0 14px var(--pink); }
.cover-opt img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ── YEAR HEADER ─────────────────────────────────────────────────────────── */
.year-header { display: flex; align-items: center; gap: 1rem; padding: 0.5rem 0 1rem; }
.year-num { font-family: 'Dela Gothic One', sans-serif; font-size: 3.5rem; letter-spacing: 0.06em; color: var(--pc); text-shadow: 0 0 30px var(--pc), 3px 3px 0 rgba(0,212,255,0.3); line-height: 1; }
.year-meta { display: flex; flex-direction: column; gap: 3px; }
.year-meta-main { font-family: 'M PLUS Rounded 1c', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }
.year-meta-sub { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }
.year-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--b3), transparent); }

/* ── FILTER PILLS ────────────────────────────────────────────────────────── */
.filter-row { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
.fpill {
  font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
  padding: 0.3rem 0.75rem; border-radius: 20px; border: 1px solid var(--b2);
  background: var(--frost); color: var(--text3); cursor: pointer; transition: all 0.15s;
}
.fpill:hover { color: var(--text2); border-color: var(--b3); }
.fpill.active { background: var(--pg); border-color: transparent; color: #fff; font-weight: 700; box-shadow: 0 0 12px var(--pc); }

/* ── TOP RATED ───────────────────────────────────────────────────────────── */
.top-item {
  background: var(--glass); border: 1px solid var(--b2); border-radius: 14px;
  padding: 0.875rem 1rem; margin-bottom: 5px;
  display: flex; align-items: center; gap: 0.875rem;
  box-shadow: 0 2px 12px rgba(255,0,150,0.06); transition: all 0.15s;
  background-image: var(--scanline); background-color: var(--glass);
}
.top-item:hover { transform: translateX(4px); border-color: var(--b3); box-shadow: 0 0 16px var(--pc); }
.top-rank { font-family: 'Dela Gothic One', sans-serif; font-size: 1.8rem; width: 2.5rem; flex-shrink: 0; color: var(--text3); line-height: 1; }
.top-rank.gold   { color: var(--yellow); text-shadow: 0 0 14px var(--yellow); }
.top-rank.silver { color: var(--silver); text-shadow: 0 0 8px var(--silver); }
.top-rank.bronze { color: var(--orange); text-shadow: 0 0 8px var(--orange); }
.top-cover { width: 38px; height: 50px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: var(--deep); }
.top-cover img { width: 100%; height: 100%; object-fit: cover; }

/* ── GOTY ────────────────────────────────────────────────────────────────── */
.goty-hero { text-align: center; padding: 2rem 0 2.5rem; }
.goty-title {
  font-family: 'Dela Gothic One', sans-serif; font-size: 3rem; letter-spacing: 0.15em;
  color: var(--pink); text-shadow: 0 0 30px var(--pink), 0 0 60px rgba(255,45,155,0.3), 4px 4px 0 rgba(0,212,255,0.4);
  line-height: 1; margin-bottom: 0.5rem;
}
.goty-sub { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text3); }
.goty-winner {
  background: var(--glass2); border: 1px solid var(--b3); border-radius: 18px;
  padding: 1.5rem; display: flex; align-items: center; gap: 1.25rem;
  box-shadow: 0 0 30px rgba(255,45,155,0.15), 0 4px 32px rgba(0,0,0,0.5); margin-bottom: 0.625rem;
  position: relative; overflow: hidden; background-image: var(--scanline); background-color: var(--glass2);
}
.goty-winner::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--pink), var(--blue), var(--purple), var(--pink));

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

const SUPA_URL = 'https://xinmcvrwyoyiwaeaqiww.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpbm1jdnJ3eW95aXdhZWFxaXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NjYyOTgsImV4cCI6MjA4OTA0MjI5OH0.c8CVcQKmqjo5I-mcZHFyMl1nBQUtjLBbAjXXPdblmEc';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const PLAYERS = [
  { id:'greg', label:'Greg', c:'#ff2d9b', g:'linear-gradient(135deg,#ff2d9b,#ff79c6)', emoji:'🎮' },
  { id:'anth', label:'Anth', c:'#cc44ff', g:'linear-gradient(135deg,#cc44ff,#7722cc)', emoji:'🕹️' },
  { id:'sam',  label:'Sam',  c:'#00d4ff', g:'linear-gradient(135deg,#00d4ff,#0055ff)', emoji:'⚡' },
  { id:'joel', label:'Joel', c:'#ff8c00', g:'linear-gradient(135deg,#ff8c00,#ffcc00)', emoji:'🔥' },
];
const VIEWS = ['greg','anth','sam','joel','goty','compare'];
const GENRES=['Action','Adventure','RPG','Strategy','Puzzle','Platformer','Shooter','Sports','Horror','Simulation','Fighting','Racing','Indie','Visual Novel','Other'];
const PLATFORMS=['PC','PlayStation 5','PlayStation 4','Xbox Series X','Xbox One','Nintendo Switch','Mobile','Other'];
const STATUSES=[{id:'playing',label:'Playing'},{id:'beaten',label:'Beaten'},{id:'backlog',label:'Backlog'},{id:'dropped',label:'Dropped'}];
const CUR_YEAR = new Date().getFullYear();
const RAWG_KEY = '1934277a3e1e4975a7d5ed786296caea';

async function fetchCovers(q) {
  try {
    const r = await fetch(`https://api.rawg.io/api/games?key=${RAWG_KEY}&search=${encodeURIComponent(q)}&page_size=6`);
    const d = await r.json();
    return (d.results||[]).filter(g=>g.background_image).map(g=>({id:g.id,name:g.name,cover:g.background_image}));
  } catch { return []; }
}

function applyTheme(p) {
  document.documentElement.style.setProperty('--pc', p.c);
  document.documentElement.style.setProperty('--pg', p.g);
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function Stars({rating, onRate, small}) {
  const [hover, setHover] = useState(0);
  const lit = hover||rating;
  return <span className="stars">{[1,2,3,4,5].map(n=>(
    <span key={n} className={`star${small?' star-sm':''}${n<=lit?' lit':''}`}
      onClick={()=>onRate&&onRate(n===rating?0:n)}
      onMouseEnter={()=>onRate&&setHover(n)} onMouseLeave={()=>onRate&&setHover(0)}>★</span>
  ))}</span>;
}

// ── GameCover ─────────────────────────────────────────────────────────────────
function Cover({url, title}) {
  const [ok, setOk] = useState(false);
  const [err, setErr] = useState(false);
  if (!url||err) return <div className="game-cover-ph">{title?.[0]?.toUpperCase()||'?'}</div>;
  return <>
    {!ok&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%'}}><div className="cover-spin"/></div>}
    <img src={url} alt={title} onLoad={()=>setOk(true)} onError={()=>setErr(true)} style={{display:ok?'block':'none',width:'100%',height:'100%',objectFit:'cover'}}/>
  </>;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({title, children, onClose}) {
  return <div className="modal-bg" onClick={e=>e.target.classList.contains('modal-bg')&&onClose()}>
    <div className="modal-box pop-in">
      <button className="modal-close" onClick={onClose}>✕</button>
      <div className="modal-title">{title}</div>
      {children}
    </div>
  </div>;
}

// ── AddGameModal ──────────────────────────────────────────────────────────────
function AddGameModal({player, onSave, onClose, editGame}) {
  const [f, setF] = useState(editGame||{title:'',status:'playing',genre:'RPG',platform:'PC',hours:'',rating:0,year:CUR_YEAR,notes:'',cover_url:''});
  const [covers, setCovers] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selCover, setSelCover] = useState(editGame?.cover_url||'');
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState('');
  const U = (k,v)=>setF(p=>({...p,[k]:v}));

  const search = async()=>{
    if(!f.title.trim()) return;
    setSearching(true);
    const r = await fetchCovers(f.title);
    setCovers(r); setSearching(false);
  };

  const handleSave = async () => {
    if(!f.title.trim()) return;
    setSaving(true);
    setSaveError('');
    try {
      // Build game object — never include id on insert
      const gameData = {
        title: f.title.trim(),
        status: f.status,
        genre: f.genre,
        platform: f.platform,
        hours: f.hours,
        rating: f.rating,
        year: f.year,
        notes: f.notes,
        cover_url: selCover,
        player: player.id,
      };
      if (editGame && editGame.id) {
        gameData.id = editGame.id;
      }
      await onSave(gameData);
      onClose();
    } catch(e) {
      setSaveError(e?.message || 'Save failed — check console');
      setSaving(false);
    }
  };

  return <Modal title={editGame?'Edit Game':'Add Game'} onClose={onClose}>
    <div className="form-grid">
      <div className="form-group col2">
        <label className="form-lbl">Title</label>
        <div style={{display:'flex',gap:'0.5rem'}}>
          <input className="form-inp" style={{flex:1}} value={f.title} onChange={e=>U('title',e.target.value)} placeholder="Game title…" autoFocus onKeyDown={e=>e.key==='Enter'&&search()}/>
          <button className="btn btn-sm" onClick={search} disabled={searching}>{searching?'…':'🔍 Art'}</button>
        </div>
      </div>
      {covers.length>0&&<div className="form-group col2">
        <label className="form-lbl">Select Cover Art</label>
        <div className="cover-results">
          {covers.map(r=><div key={r.id} className={`cover-opt${selCover===r.cover?' sel':''}`} onClick={()=>setSelCover(r.cover)}><img src={r.cover} alt={r.name} loading="lazy"/></div>)}
        </div>
        {selCover&&<div style={{fontSize:10,color:'var(--green)',marginTop:4}}>✓ Art selected</div>}
      </div>}
      <div className="form-group">
        <label className="form-lbl">Status</label>
        <select className="form-sel" value={f.status} onChange={e=>U('status',e.target.value)}>
          {STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label className="form-lbl">Year</label>
        <input className="form-inp" type="number" value={f.year} onChange={e=>U('year',parseInt(e.target.value)||CUR_YEAR)} min="1970" max="2040"/>
      </div>
      <div className="form-group">
        <label className="form-lbl">Genre</label>
        <select className="form-sel" value={f.genre} onChange={e=>U('genre',e.target.value)}>
          {GENRES.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label className="form-lbl">Platform</label>
        <select className="form-sel" value={f.platform} onChange={e=>U('platform',e.target.value)}>
          {PLATFORMS.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label className="form-lbl">Hours Played</label>
        <input className="form-inp" type="number" value={f.hours} onChange={e=>U('hours',e.target.value)} placeholder="0" min="0"/>
      </div>
      <div className="form-group">
        <label className="form-lbl">Your Rating</label>
        <div style={{paddingTop:'0.5rem'}}><Stars rating={f.rating} onRate={v=>U('rating',v)}/></div>
      </div>
      <div className="form-group col2">
        <label className="form-lbl">Notes</label>
        <textarea className="form-txta" rows={2} value={f.notes} onChange={e=>U('notes',e.target.value)} placeholder="Thoughts…"/>
      </div>
    </div>
    {saveError&&<div style={{color:'#ff4488',fontSize:12,marginTop:8,fontFamily:'Share Tech Mono',letterSpacing:'0.05em'}}>⚠ {saveError}</div>}
    <div className="modal-actions">
      <button className="btn" onClick={onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
        {saving?'Saving…':editGame?'Save Changes':'Add to Log'}
      </button>
    </div>
  </Modal>;
}

// ── GameCard ──────────────────────────────────────────────────────────────────
function GameCard({game, player, onEdit, onDelete, onRate, readOnly}) {
  const SC = {playing:'pill-playing',beaten:'pill-beaten',backlog:'pill-backlog',dropped:'pill-dropped'};
  return <div className="game-card fade-in">
    <div className="game-accent" style={{background:player.g}}/>
    <div className="game-cover"><Cover url={game.cover_url} title={game.title}/></div>
    <div className="game-body">
      <div>
        <div className="game-title">{game.title}</div>
        <div className="game-pills">
          <span className={`pill ${SC[game.status]||''}`}>{STATUSES.find(s=>s.id===game.status)?.label||game.status}</span>
          <span className="pill">{game.genre}</span>
          <span className="pill">{game.platform}</span>
          {game.year&&<span className="pill">{game.year}</span>}
          {game.hours?<span className="pill">⏱ {game.hours}h</span>:null}
        </div>
        {game.notes&&<div style={{fontSize:11,color:'var(--text2)',fontStyle:'italic',marginBottom:4}}>{game.notes}</div>}
      </div>
      <div className="game-bottom">
        <Stars rating={game.rating} onRate={readOnly?null:onRate} small/>
        {!readOnly&&<div className="game-actions">
          <button className="btn btn-sm btn-ghost" onClick={onEdit}>Edit</button>
          <button className="btn btn-sm btn-danger" onClick={onDelete}>✕</button>
        </div>}
      </div>
    </div>
  </div>;
}

// ── PlayerView ────────────────────────────────────────────────────────────────
function PlayerView({player, games, onAdd, onUpdate, onDelete, isOwn}) {
  const [tab, setTab] = useState('all');
  const [showAdd, setShowAdd] = useState(false);
  const [editGame, setEditGame] = useState(null);
  const [filterYear, setFilterYear] = useState('all');

  const beaten = games.filter(g=>g.status==='beaten');
  const playing = games.filter(g=>g.status==='playing');
  const hours = Math.round(games.reduce((s,g)=>s+(parseFloat(g.hours)||0),0));
  const rated = games.filter(g=>g.rating>0);
  const avg = rated.length?(rated.reduce((s,g)=>s+g.rating,0)/rated.length).toFixed(1):'—';
  const years = [...new Set(games.map(g=>g.year||CUR_YEAR))].sort((a,b)=>b-a);

  const TABS=[{id:'all',label:'All'},{id:'playing',label:'🎮 Playing'},{id:'beaten',label:'✅ Beaten'},{id:'backlog',label:'📋 Backlog'},{id:'by-year',label:'📅 By Year'},{id:'top',label:'⭐ Top Rated'}];

  let shown = games.filter(g=>{
    if(tab==='playing') return g.status==='playing';
    if(tab==='beaten')  return g.status==='beaten';
    if(tab==='backlog') return g.status==='backlog';
    return true;
  });
  if(filterYear!=='all') shown=shown.filter(g=>String(g.year||CUR_YEAR)===filterYear);

  const top = [...games].filter(g=>g.rating>0).sort((a,b)=>b.rating-a.rating||(b.hours||0)-(a.hours||0)).slice(0,10);

  return <div className="fade-in">
    {!isOwn&&<div className="readonly-banner">👀 Viewing {player.label}'s collection — read only</div>}
    <div className="stat-row">
      {[{n:games.length,l:'Games'},{n:beaten.length,l:'Beaten'},{n:playing.length,l:'Playing'},{n:hours,l:'Hours'},{n:avg,l:'Avg ★'}].map(s=>(
        <div key={s.l} className="stat-card"><div className="stat-num">{s.n}</div><div className="stat-lbl">{s.l}</div></div>
      ))}
    </div>

    <div className="tabs-actions">
      <div className="nav-tabs">
        {TABS.map(t=><button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>
      {isOwn&&<button className="btn btn-primary" onClick={()=>setShowAdd(true)}>＋ Add Game</button>}
    </div>

    {tab==='by-year'&&<div className="filter-row">
      <button className={`fpill${filterYear==='all'?' active':''}`} onClick={()=>setFilterYear('all')}>All Years</button>
      {years.map(y=><button key={y} className={`fpill${filterYear===String(y)?' active':''}`} onClick={()=>setFilterYear(String(y))}>{y}</button>)}
    </div>}

    {tab==='top'
      ? top.length
        ? top.map((g,i)=>{
            const ranks=['gold','silver','bronze'];
            return <div key={g.id} className="top-item">
              <div className={`top-rank${i<3?' '+ranks[i]:''}`}>{i+1}</div>
              <div className="top-cover">{g.cover_url&&<img src={g.cover_url} alt={g.title}/>}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13,color:'var(--chrome-bright)',marginBottom:3}}>{g.title}</div>
                <Stars rating={g.rating} small/>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:3,fontFamily:"'Share Tech Mono',monospace"}}>{g.platform} · {g.year||CUR_YEAR}{g.hours?' · '+g.hours+'h':''}</div>
              </div>
            </div>;
          })
        : <div className="empty"><span className="empty-icon">⭐</span><div className="empty-title">No Rated Games</div><div className="empty-sub">Rate games to see your top list</div></div>
      : shown.length
        ? shown.map(g=><GameCard key={g.id} game={g} player={player}
            onEdit={()=>setEditGame(g)}
            onDelete={()=>{ if(confirm('Remove this game?')) onDelete(g.id); }}
            onRate={v=>onUpdate({...g,rating:v})}
          />)
        : <div className="empty"><span className="empty-icon">🎮</span><div className="empty-title">No Games Here</div><div className="empty-sub">Add some games to get started</div></div>
    }

    {showAdd&&<AddGameModal player={player} onClose={()=>setShowAdd(false)} onSave={onAdd}/>}
    {editGame&&<AddGameModal player={player} editGame={editGame} onClose={()=>setEditGame(null)} onSave={onUpdate}/>}
  </div>;
}

// ── GotyView ──────────────────────────────────────────────────────────────────
function GotyView({allGames}) {
  const CUR = CUR_YEAR;
  const [selYear, setSelYear] = useState(CUR);
  const allYears = [...new Set(allGames.map(g=>g.year||CUR))].sort((a,b)=>b-a);
  if(!allYears.includes(selYear)&&allYears.length) setSelYear(allYears[0]);

  const byPlayer = PLAYERS.map(p=>{
    const gs=allGames.filter(g=>g.player===p.id&&(g.year||CUR)===selYear&&g.rating>0);
    const top=[...gs].sort((a,b)=>b.rating-a.rating)[0]||null;
    return {...p,top};
  });

  const allRated=allGames.filter(g=>(g.year||CUR)===selYear&&g.rating>0);
  const overall=[...allRated].sort((a,b)=>b.rating-a.rating-(a.rating-b.rating));
  const winner=overall[0]||null;
  const runners=overall.slice(1,4);

  return <div className="fade-in">
    <div className="goty-hero">
      <div className="goty-title">GAME OF THE YEAR</div>
      <div className="goty-sub">{"// community picks //"}</div>
      <div style={{display:'flex',gap:'0.4rem',justifyContent:'center',marginTop:'1rem',flexWrap:'wrap'}}>
        {allYears.map(y=><button key={y} className={`fpill${selYear===y?' active':''}`} onClick={()=>setSelYear(y)}>{y}</button>)}
      </div>
    </div>

    {winner
      ? <>
          <div className="sec-label">Overall Winner — {selYear}</div>
          <div className="goty-winner">
            <div className="goty-winner-cover">{winner.cover_url&&<img src={winner.cover_url} alt={winner.title}/>}</div>
            <div className="goty-winner-info">
              <span className="goty-crown">👑</span>
              <div className="goty-winner-title">{winner.title}</div>
              <div className="goty-winner-meta">{winner.platform} · {winner.genre}</div>
              <Stars rating={winner.rating} small/>
            </div>
          </div>
          {runners.length>0&&<><div className="sec-label" style={{marginTop:'1.5rem'}}>Runners Up</div>
          {runners.map(g=><div key={g.id} className="goty-runner">
            <div className="goty-runner-cover">{g.cover_url&&<img src={g.cover_url} alt={g.title}/>}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:13,color:'var(--chrome-bright)'}}>{g.title}</div><Stars rating={g.rating} small/></div>
          </div>)}</>}
        </>
      : <div className="empty"><span className="empty-icon">🏆</span><div className="empty-title">No Rated Games in {selYear}</div><div className="empty-sub">Rate games to crown a winner</div></div>
    }

    <div className="sec-label" style={{marginTop:'2rem'}}>Each Player's Pick — {selYear}</div>
    <div className="player-goty-grid">
      {byPlayer.map(p=>(
        <div key={p.id} className="player-goty-card" style={{'--pc2':p.c}}>
          <div className="pgoty-name" style={{color:p.c}}>{p.emoji} {p.label}</div>
          {p.top
            ? <div className="pgoty-game">
                <div className="pgoty-cover">{p.top.cover_url&&<img src={p.top.cover_url} alt={p.top.title}/>}</div>
                <div><div className="pgoty-title">{p.top.title}</div><Stars rating={p.top.rating} small/></div>
              </div>
            : <div className="pgoty-none">No rated games</div>}
        </div>
      ))}
    </div>

    <div className="sec-label">All Games Played in {selYear}</div>
    {PLAYERS.map(p=>{
      const pg = allGames.filter(g=>g.player===p.id&&(g.year||CUR_YEAR)===selYear).sort((a,b)=>(b.rating||0)-(a.rating||0));
      if(!pg.length) return null;
      return <div key={p.id} style={{marginBottom:'2rem'}}>
        <div className="sec-label" style={{color:p.c}}>{p.emoji} {p.label} — {pg.length} game{pg.length!==1?'s':''}</div>
        {pg.map(g=><GameCard key={g.id} game={g} player={p} readOnly={true}/>)}
      </div>;
    })}
    {!allGames.filter(g=>(g.year||CUR_YEAR)===selYear).length&&<div className="empty"><span className="empty-icon">🎮</span><div className="empty-title">No Games in {selYear}</div><div className="empty-sub">Add games with this year to see them here</div></div>}
  </div>;
}

// ── CompareView ───────────────────────────────────────────────────────────────
function CompareView({allGames}) {
  const stats = PLAYERS.map(p=>{
    const gs=allGames.filter(g=>g.player===p.id);
    const beaten=gs.filter(g=>g.status==='beaten').length;
    const playing=gs.filter(g=>g.status==='playing').length;
    const hours=Math.round(gs.reduce((s,g)=>s+(parseFloat(g.hours)||0),0));
    const rated=gs.filter(g=>g.rating>0);
    const avg=rated.length?(rated.reduce((s,g)=>s+g.rating,0)/rated.length).toFixed(1):'—';
    const top=[...gs].filter(g=>g.rating>0).sort((a,b)=>b.rating-a.rating)[0];
    const genres={};gs.forEach(g=>{genres[g.genre]=(genres[g.genre]||0)+1;});
    const fave=Object.entries(genres).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
    return {...p,total:gs.length,beaten,playing,hours,avg,top,fave};
  });

  const allYears=[...new Set(allGames.map(g=>g.year||CUR_YEAR))].sort((a,b)=>b-a);
  const metrics=[
    {l:'Total Games',f:s=>s.total},
    {l:'Beaten',     f:s=>s.beaten},
    {l:'Playing',    f:s=>s.playing},
    {l:'Hours',      f:s=>s.hours, fmt:v=>v+'h'},
    {l:'Avg Rating', f:s=>parseFloat(s.avg)||0, fmt:v=>v||'—'},
  ];

  return <div className="fade-in">
    <div style={{textAlign:'center',padding:'1.5rem 0 2rem'}}>
      <div style={{fontFamily:"'Dela Gothic One',sans-serif",fontSize:'2.5rem',letterSpacing:'0.12em',background:'var(--chrome-grad)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',marginBottom:4,filter:'drop-shadow(0 0 16px rgba(255,45,155,0.4))'}}>Head to Head</div>
      <div style={{fontSize:11,color:'var(--chrome-steel)',letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:600,fontFamily:"'Share Tech Mono',monospace"}}>Stats across all players</div>
    </div>
    <div className="cmp-grid">
      {stats.map(p=>(
        <div key={p.id} className="cmp-card" style={{'--pc2':p.c}}>
          <div className="cmp-name" style={{color:p.c}}>{p.emoji} {p.label}</div>
          {[['Games',p.total],['Beaten',p.beaten],['Playing',p.playing],['Hours',p.hours+'h'],['Avg',p.avg],['Fave Genre',p.fave]].map(([k,v])=>(
            <div key={k} className="cmp-row"><span className="cmp-key">{k}</span><span className="cmp-val" style={{color:p.c}}>{v}</span></div>
          ))}
          {p.top&&<div style={{marginTop:'0.75rem',paddingTop:'0.75rem',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--chrome-steel)',marginBottom:6,fontFamily:"'Share Tech Mono',monospace"}}>Top Rated</div>
            {p.top.cover_url&&<img src={p.top.cover_url} style={{width:'100%',height:70,objectFit:'cover',borderRadius:8,marginBottom:6}} alt={p.top.title}/>}
            <div style={{fontWeight:700,fontSize:12,color:'var(--chrome-bright)',marginBottom:3}}>{p.top.title}</div>
            <Stars rating={p.top.rating} small/>
          </div>}
        </div>
      ))}
    </div>
    <div className="vs-wrap">
      <div className="vs-title">Rankings</div>
      <div className="vs-row hdr"><span>Metric</span>{PLAYERS.map(p=><span key={p.id} style={{color:p.c}}>{p.label}</span>)}</div>
      {metrics.map(({l,f,fmt})=>{
        const vals=stats.map(f); const max=Math.max(...vals);
        return <div key={l} className="vs-row">
          <span style={{color:'var(--chrome-light)',fontSize:11,fontFamily:"'Share Tech Mono',monospace"}}>{l}</span>
          {stats.map((s,i)=>{const v=vals[i];const isM=v===max&&max>0;return(
            <span key={s.id} style={{fontWeight:isM?700:400,color:isM?s.c:'var(--chrome-steel)',fontSize:isM?'13px':'12px',fontFamily:"'Share Tech Mono',monospace"}}>
              {fmt?fmt(v):v}{isM?' ✦':''}
            </span>
          );})}
        </div>;
      })}
    </div>
    {allYears.length>0&&<div className="vs-wrap">
      <div className="vs-title">By Year</div>
      <div className="vs-row hdr"><span>Year</span>{PLAYERS.map(p=><span key={p.id} style={{color:p.c}}>{p.label}</span>)}</div>
      {allYears.map(yr=>(
        <div key={yr} className="vs-row">
          <span style={{fontFamily:"'Dela Gothic One',sans-serif",fontSize:'1rem',color:'var(--chrome-silver)',letterSpacing:'0.05em'}}>{yr}</span>
          {PLAYERS.map(p=>{
            const cnt=allGames.filter(g=>g.player===p.id&&(g.year||CUR_YEAR)===yr).length;
            const bt=allGames.filter(g=>g.player===p.id&&(g.year||CUR_YEAR)===yr&&g.status==='beaten').length;
            return <span key={p.id} style={{fontSize:12,fontWeight:cnt>0?600:400,color:cnt>0?p.c:'var(--chrome-steel)',fontFamily:"'Share Tech Mono',monospace"}}>{cnt>0?`${cnt} (${bt}✓)`:'—'}</span>;
          })}
        </div>
      ))}
    </div>}
  </div>;
}

// ── FAB ───────────────────────────────────────────────────────────────────────
function FabAdd({ player, onAdd }) {
  const [open, setOpen] = useState(false);
  return <>
    <button className="fab" style={{'--pc':player.c,'--pg':player.g}} onClick={()=>setOpen(true)}>＋</button>
    {open&&<AddGameModal player={player} onClose={()=>setOpen(false)} onSave={onAdd}/>}
  </>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState('greg');
  const [allGames, setAllGames] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState('');

  const showToast = msg=>{ setToast(msg); setTimeout(()=>setToast(''),3000); };

  const load = async()=>{
    const {data,error}=await sb.from('games').select('*').order('created_at',{ascending:false});
    if(!error) setAllGames(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  useEffect(()=>{
    const sub=sb.channel('games').on('postgres_changes',{event:'*',schema:'public',table:'games'},()=>load()).subscribe();
    return ()=>sb.removeChannel(sub);
  },[]);

  useEffect(()=>{
    const p=active==='goty'||active==='compare'
      ? {c:'#ff2d9b',g:'linear-gradient(135deg,#ff2d9b,#cc44ff)'}
      : PLAYERS.find(p=>p.id===active);
    if(p) applyTheme(p);
  },[active]);

  const cp = PLAYERS.find(p=>p.id===active);
  const pg = id=>allGames.filter(g=>g.player===id);

  const onAdd = async g=>{
    const {data, error}=await sb.from('games').insert([g]).select();
    if(error) {
      console.error('Supabase insert error:', error);
      throw new Error(error.message || error.code || 'Insert failed');
    }
    showToast('✨ Game added!');
    load();
  };

  const onUpdate = async g=>{
    const {error}=await sb.from('games').update(g).eq('id',g.id);
    if(error) {
      console.error('Supabase update error:', error);
      throw new Error(error.message || 'Update failed');
    }
    showToast('✓ Saved!');
  };

  const onDelete = async id=>{
    const {error}=await sb.from('games').delete().eq('id',id);
    if(error) console.error('Delete error:', error);
    showToast('Removed');
  };

  if(loading) return <div className="loading-screen">
    <div className="loading-logo">PLAYLOG</div>
    <div className="loading-bar"><div className="loading-fill"/></div>
    <div style={{fontSize:11,color:'var(--text3)',letterSpacing:'0.15em',fontFamily:"'Share Tech Mono',monospace"}}>LOADING COLLECTION…</div>
  </div>;

  const RAIL = [
    ...PLAYERS,
    {id:'goty',    label:'GOTY',    c:'#ff2d9b', g:'linear-gradient(135deg,#ff2d9b,#cc44ff)', emoji:'🏆'},
    {id:'compare', label:'Compare', c:'#00d4ff', g:'linear-gradient(135deg,#00d4ff,#cc44ff)', emoji:'📊'},
  ];

  return <div>
    <div className="site-header">
      <div className="header-inner">
        <div className="logo-block">
          <div className="logo-eyebrow">// Videogame Tracker //</div>
          <div className="logo">PLAYLOG</div>
        </div>
        <div className="header-badge">
          <div className="header-badge-name">{active==='goty'?'GOTY':active==='compare'?'ALL':cp?.label||''}</div>
          <div className="header-badge-sub">{active==='goty'?'Awards':active==='compare'?'Players':pg(active).length+' games'}</div>
        </div>
      </div>
    </div>

    <div className="player-rail">
      {RAIL.map(p=>(
        <button key={p.id} className={`prail-btn${active===p.id?' active':''}`} onClick={()=>setActive(p.id)}>
          <span className="prail-dot" style={{background:p.c}}/>
          {p.emoji} {p.label}
        </button>
      ))}
    </div>

    {active==='goty'    && <GotyView    allGames={allGames}/>}
    {active==='compare' && <CompareView allGames={allGames}/>}
    {cp&&<PlayerView
      key={active}
      player={cp}
      games={pg(active)}
      isOwn={true}
      onAdd={onAdd}
      onUpdate={onUpdate}
      onDelete={onDelete}
    />}

    {cp&&<FabAdd player={cp} onAdd={onAdd}/>}

    <nav className="bottom-nav">
      {RAIL.map(p=>(
        <button key={p.id} className={`bnav-btn${active===p.id?' active':''}`}
          onClick={()=>setActive(p.id)}
          style={active===p.id ? {color:p.c} : {}}>
          <span className="bnav-emoji">{p.emoji}</span>
          <span className="bnav-label" style={active===p.id ? {color:p.c,textShadow:`0 0 8px ${p.c}`} : {}}>{p.label}</span>
        </button>
      ))}
    </nav>

    {toast&&<div className="toast">{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
